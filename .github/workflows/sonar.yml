name: SonarQube Full Analysis

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/**
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "*.txt"

permissions:
  contents: read

env:
  GO_VERSION_FILE: go.mod

jobs:
  # ============================================================
  # Primary Quality Gate: SonarQube Full Analysis
  # ============================================================

  sonar-analysis:
    name: SonarQube Full Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Sonar configuration
        id: sonar-config
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarQube secrets not configured. Skipping analysis."
          fi

      - name: Checkout
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Generate Go coverage
        if: steps.sonar-config.outputs.enabled == 'true'
        run: go test -coverprofile=coverage.out ./...

      - name: SonarQube scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Report local analysis info
        if: steps.sonar-config.outputs.enabled != 'true'
        run: |
          echo "============================================"
          echo "  SonarQube Analysis Skipped"
          echo "============================================"
          echo "Reason: SONAR_TOKEN or SONAR_HOST_URL not configured"
          echo ""
          echo "To enable SonarQube analysis:"
          echo "  1. Set SONAR_TOKEN secret in repository settings"
          echo "  2. Set SONAR_HOST_URL secret (e.g., https://sonarcloud.io)"
          echo ""
          echo "For local analysis, run:"
          echo "  ./scripts/run-sonar.ps1"
          echo "============================================"