name: Code Quality Gates

on:
  workflow_dispatch:
  pull_request:
  merge_group:

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  GO_VERSION_FILE: go.mod

jobs:
  docs-governance:
    name: Docs Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Check docs frontmatter
        run: npm run check:docs-frontmatter

      - name: Check task packet template
        run: npm run check:task-packet-template

      - name: Check generated modules
        run: npm run check:generated-modules

  frontend-contract:
    name: Frontend Contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check menu contract
        working-directory: frontend
        run: npm run check:menu-contract

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          PANTHEON_CI: "true"
        run: |
          npm run i18n:generate-module
          npx vite build

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Test backend
        run: go test -race ./...

  quality-gates:
    name: Quality Gates
    needs:
      - docs-governance
      - frontend-contract
      - backend-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce quality results
        shell: bash
        env:
          DOCS_GOVERNANCE_RESULT: ${{ needs.docs-governance.result }}
          FRONTEND_CONTRACT_RESULT: ${{ needs.frontend-contract.result }}
          BACKEND_TESTS_RESULT: ${{ needs.backend-tests.result }}
        run: |
          echo "Docs Governance: ${DOCS_GOVERNANCE_RESULT}"
          echo "Frontend Contract: ${FRONTEND_CONTRACT_RESULT}"
          echo "Backend Tests: ${BACKEND_TESTS_RESULT}"
          if [ "${DOCS_GOVERNANCE_RESULT}" != "success" ] || \
             [ "${FRONTEND_CONTRACT_RESULT}" != "success" ] || \
             [ "${BACKEND_TESTS_RESULT}" != "success" ]; then
            exit 1
          fi
