name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
  merge_group:
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  dependency-vulnerabilities:
    name: Dependency Vulnerabilities
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          package-manager-cache: false

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Report Go vulnerabilities
        id: govulncheck
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 -json ./... > security-reports/govulncheck.json

      - name: Report root npm vulnerabilities
        id: npm-audit-root
        continue-on-error: true
        run: |
          npm ci
          npm audit --registry=https://registry.npmjs.org --json --audit-level=high > security-reports/npm-audit-root.json

      - name: Report frontend npm vulnerabilities
        id: npm-audit-frontend
        continue-on-error: true
        working-directory: frontend
        run: |
          npm ci
          npm audit --registry=https://registry.npmjs.org --json --audit-level=high > ../security-reports/npm-audit-frontend.json

      - name: Report OSV vulnerabilities
        id: osv-scanner
        continue-on-error: true
        run: go run github.com/google/osv-scanner/v2/cmd/osv-scanner@latest scan --recursive --format json --output security-reports/osv-scanner.json .

      - name: Upload dependency reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-dependency-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce dependency vulnerability gate
        if: always()
        shell: bash
        env:
          GOVULNCHECK_RESULT: ${{ steps.govulncheck.outcome }}
          NPM_AUDIT_ROOT_RESULT: ${{ steps.npm-audit-root.outcome }}
          NPM_AUDIT_FRONTEND_RESULT: ${{ steps.npm-audit-frontend.outcome }}
          OSV_SCANNER_RESULT: ${{ steps.osv-scanner.outcome }}
        run: |
          echo "govulncheck: ${GOVULNCHECK_RESULT}"
          echo "npm audit (root): ${NPM_AUDIT_ROOT_RESULT}"
          echo "npm audit (frontend): ${NPM_AUDIT_FRONTEND_RESULT}"
          echo "osv-scanner: ${OSV_SCANNER_RESULT}"
          if [ "${GOVULNCHECK_RESULT}" != "success" ] || \
             [ "${NPM_AUDIT_ROOT_RESULT}" != "success" ] || \
             [ "${NPM_AUDIT_FRONTEND_RESULT}" != "success" ] || \
             [ "${OSV_SCANNER_RESULT}" != "success" ]; then
            exit 1
          fi

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: false

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Report leaked secrets
        id: gitleaks
        continue-on-error: true
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MERGE_GROUP_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          set -euo pipefail
          log_opts=()
          if [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${PR_BASE_SHA}" ] && [ -n "${PR_HEAD_SHA}" ]; then
            log_opts=(--log-opts="${PR_BASE_SHA}..${PR_HEAD_SHA}")
          elif [ "${EVENT_NAME}" = "merge_group" ] && [ -n "${MERGE_GROUP_BASE_SHA}" ] && [ -n "${MERGE_GROUP_HEAD_SHA}" ]; then
            log_opts=(--log-opts="${MERGE_GROUP_BASE_SHA}..${MERGE_GROUP_HEAD_SHA}")
          fi

          go run github.com/zricethezav/gitleaks/v8@v8.30.1 detect \
            --source . \
            "${log_opts[@]}" \
            --redact \
            --report-format json \
            --report-path security-reports/gitleaks.json

      - name: Upload secret reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-secret-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce secret scan gate
        if: always()
        shell: bash
        env:
          GITLEAKS_RESULT: ${{ steps.gitleaks.outcome }}
        run: |
          echo "gitleaks: ${GITLEAKS_RESULT}"
          if [ "${GITLEAKS_RESULT}" != "success" ]; then
            exit 1
          fi

  workflow-posture:
    name: Workflow Posture
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.x"

      - name: Report workflow risks with zizmor
        id: zizmor
        continue-on-error: true
        shell: bash
        run: |
          python -m pip install --user zizmor==1.25.2
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/zizmor" --format json .github/workflows > security-reports/zizmor.json

      - name: Upload workflow posture reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-workflow-posture-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce workflow posture gate
        if: always()
        shell: bash
        env:
          ZIZMOR_RESULT: ${{ steps.zizmor.outcome }}
        run: |
          echo "zizmor: ${ZIZMOR_RESULT}"
          if [ "${ZIZMOR_RESULT}" != "success" ]; then
            exit 1
          fi

  codeql-security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          languages: go, typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          category: "/language:go,typescript"

  codeql-alerts:
    name: CodeQL Alert Gate
    needs:
      - codeql-security
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    steps:
      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Check open CodeQL alerts
        id: codeql-alerts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if ! gh api "repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&tool_name=CodeQL&per_page=100" > security-reports/codeql-alerts.json; then
            if [ "${EVENT_NAME}" = "pull_request" ] || [ "${EVENT_NAME}" = "merge_group" ]; then
              echo '{"apiError":"code-scanning alerts were not readable for this event"}' > security-reports/codeql-alerts.json
              echo "CodeQL alert API unavailable for ${EVENT_NAME}; recording report-only gap."
              exit 0
            fi
            exit 1
          fi

          high_or_critical_count="$(jq '[.[] | select((.rule.security_severity_level // "") == "high" or (.rule.security_severity_level // "") == "critical")] | length' security-reports/codeql-alerts.json)"
          total_count="$(jq 'length' security-reports/codeql-alerts.json)"
          echo "open CodeQL alerts: ${total_count}"
          echo "open high/critical CodeQL alerts: ${high_or_critical_count}"

          if [ "${EVENT_NAME}" = "pull_request" ] || [ "${EVENT_NAME}" = "merge_group" ]; then
            echo "CodeQL open-alert baseline is report-only for PR and merge_group until existing alerts are remediated."
            exit 0
          fi

          if [ "${high_or_critical_count}" != "0" ]; then
            exit 1
          fi

      - name: Upload CodeQL alert report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-codeql-alert-report
          path: security-reports/codeql-alerts.json
          if-no-files-found: warn

  security-gates:
    name: Security Gates
    needs:
      - dependency-vulnerabilities
      - secret-scan
      - workflow-posture
      - codeql-security
      - codeql-alerts
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce security results
        shell: bash
        env:
          DEPENDENCY_VULNERABILITIES_RESULT: ${{ needs.dependency-vulnerabilities.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          WORKFLOW_POSTURE_RESULT: ${{ needs.workflow-posture.result }}
          CODEQL_SECURITY_SCAN_RESULT: ${{ needs.codeql-security.result }}
          CODEQL_ALERT_RESULT: ${{ needs.codeql-alerts.result }}
        run: |
          echo "Dependency Vulnerabilities: ${DEPENDENCY_VULNERABILITIES_RESULT}"
          echo "Secret Scan: ${SECRET_SCAN_RESULT}"
          echo "Workflow Posture: ${WORKFLOW_POSTURE_RESULT}"
          echo "CodeQL Security Scan: ${CODEQL_SECURITY_SCAN_RESULT}"
          echo "CodeQL Alert Gate: ${CODEQL_ALERT_RESULT}"
          if [ "${DEPENDENCY_VULNERABILITIES_RESULT}" != "success" ] && \
             [ "${DEPENDENCY_VULNERABILITIES_RESULT}" != "skipped" ]; then
            exit 1
          fi
          if [ "${SECRET_SCAN_RESULT}" != "success" ] || \
             [ "${WORKFLOW_POSTURE_RESULT}" != "success" ] || \
             [ "${CODEQL_SECURITY_SCAN_RESULT}" != "success" ] || \
             [ "${CODEQL_ALERT_RESULT}" != "success" ]; then
            exit 1
          fi
